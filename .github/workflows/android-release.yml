name: Android CI (Release)

on:
  # 注释掉 push 触发，停止代码提交时的自动构建
  # push:
  #   branches: [ "main" ]
  
  # 注释掉 pull_request 触发，停止创建 PR 时的自动构建
  # pull_request:
  #   branches: [ "main" ]
  
  # 保留 workflow_dispatch，允许在 GitHub 网页端手动触发构建
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Number (e.g., 1.2.0)'
        required: true
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 从 GitHub Secrets 解码 Keystore 文件
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_B64 }}
      run: |
        echo $ENCODED_STRING | base64 -di > app/release-key.jks

    # 执行 Release 编译并注入签名参数
    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: >
        ./gradlew assembleRelease 
        -Pandroid.injected.signing.store.file=release-key.jks 
        -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD 
        -Pandroid.injected.signing.key.alias=$KEY_ALIAS 
        -Pandroid.injected.signing.key.password=$KEY_PASSWORD

    # 重命名 APK，以便产出符合版本号要求的文件名
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/openlist_mobile_v${{ github.event.inputs.version }}_android_universal.apk

    # 上传 Release APK
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openlist_mobile_v${{ github.event.inputs.version }}_android_universal
        path: app/build/outputs/apk/release/openlist_mobile_v${{ github.event.inputs.version }}_android_universal.apk
